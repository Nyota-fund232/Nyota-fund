<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyota Fund</title>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXX');
</script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #0d6efd, #0a58ca);
  color: white;
}

header {
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 400px;
  margin: auto;
  background: white;
  color: black;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #0d6efd;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  margin-top: 10px;
}

.info {
  text-align: center;
  margin-top: 15px;
}
</style>
</head>

<body>

<header>
  <h1>Nyota Fund</h1>
  <p>Fast & Reliable Loans</p>
</header>

<div class="container">
  <h2>Login / Register</h2>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="trackLogin(); login()">Login</button>
  <button onclick="register()">Register</button>

  <div class="info">
    <p>Registration fee: Ksh 100</p>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD-OgudDcXgJLdh6bEK-ACtVvnIa7EMXWE",
  authDomain: "nyota-fund-8388b.firebaseapp.com",
  projectId: "nyota-fund-8388b",
  storageBucket: "nyota-fund-8388b.firebasestorage.app",
  messagingSenderId: "516939154715",
  appId: "1:516939154715:web:8c89af218e026bd2fcffbe",
  measurementId: "G-BYRMGDBWB5"
};

firebase.initializeApp(firebaseConfig);

// LOGIN
function login() {
  let email = document.getElementById('email').value;
  let password = document.getElementById('password').value;

  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(() => {
      window.location.href = "dashboard.html";
    })
    .catch((error) => {
      alert(error.message);
    });
}

// REGISTER
function register() {
  let email = document.getElementById('email').value;
  let password = document.getElementById('password').value;

  firebase.auth().createUserWithEmailAndPassword(email, password)
    .then(() => {
      alert("Registration successful");
    })
    .catch((error) => {
      alert(error.message);
    });
}

// TRACK LOGIN CLICK
function trackLogin() {
  gtag('event', 'login_click', {
    event_category: 'engagement',
    event_label: 'Login Button'
  });
}
</script>

</body>
</html>
