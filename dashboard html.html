<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyota Dashboard</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d6efd;
  color: white;
}

header {
  background: #0a58ca;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}

.container {
  padding: 20px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 10px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  background: #0d6efd;
  color: white;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #0a58ca;
}
</style>
</head>

<body>

<header>Nyota Fund Dashboard</header>

<div class="container">

  <div class="card">
    <h3>Welcome</h3>
    <p id="userEmail">Loading...</p>
  </div>

  <div class="card">
    <h3>Loan Options</h3>
    <p>Apply for loans from Ksh 500 to Ksh 50,000</p>
    <button onclick="applyLoan()">Apply Loan</button>
  </div>

  <div class="card">
    <h3>Account</h3>
    <button onclick="logout()">Logout</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "PASTE_HERE",
  authDomain: "PASTE_HERE",
  projectId: "PASTE_HERE",
  storageBucket: "PASTE_HERE",
  messagingSenderId: "PASTE_HERE",
  appId: "PASTE_HERE"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged((user) => {
  if (user) {
    document.getElementById("userEmail").innerText = user.email;
  } else {
    window.location.href = "index.html";
  }
});

function logout() {
  auth.signOut().then(() => {
    window.location.href = "index.html";
  });
}

function applyLoan() {
  alert("Loan request submitted!");
}
</script>

</body>
</html>
